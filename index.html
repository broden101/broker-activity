<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Broker Activity · BB BK CC</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;color:#e8e0d4;font-family:'Inter',system-ui,sans-serif;overflow-y:auto;min-height:100vh}
.h{display:flex;align-items:center;padding:10px 20px;gap:12px;border-bottom:1px solid rgba(214,173,90,.12);flex-wrap:wrap}
.h h1{font-size:14px;font-weight:900;color:#d6ad5a;letter-spacing:.05em}
.h .sub{font-size:9px;color:#756f66}
.ct{display:flex;gap:8px;padding:6px 20px;flex-wrap:wrap;align-items:end;border-bottom:1px solid rgba(255,255,255,.03)}
.cg{display:flex;flex-direction:column;gap:2px}
.cg label{font-size:7px;text-transform:uppercase;letter-spacing:.12em;color:#756f66;font-weight:600}
.cg select,.cg input{background:#141418;border:1px solid rgba(214,173,90,.12);color:#e8e0d4;padding:5px 8px;border-radius:4px;font-size:11px;font-family:'JetBrains Mono',monospace;outline:none;height:26px}
.cg select:focus,.cg input:focus{border-color:rgba(214,173,90,.4)}
.cg select[multiple]{height:auto;min-height:65px;padding:2px;font-size:9px}
.cg select[multiple] option{padding:2px 4px}
button.go{background:linear-gradient(135deg,#d6ad5a,#a9823c);color:#050508;border:none;padding:5px 14px;border-radius:4px;font-weight:700;font-size:10px;cursor:pointer;height:26px;letter-spacing:.04em}
button.go:hover{opacity:.85}
button.go:disabled{opacity:.4;cursor:wait}
.err{color:#ef4444;font-size:10px;padding:4px 20px;background:#ef444408;display:none}
.ld{text-align:center;padding:60px 20px;font-size:12px;color:#555}
.ld::after{content:'...';animation:dl 1.2s infinite}
@keyframes dl{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
.bx{padding:10px 20px}
.bs{margin-bottom:12px;border:1px solid rgba(255,255,255,.04);border-radius:6px;overflow:hidden}
.bs-h{padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.bs-h .nm{font-size:12px;font-weight:900;letter-spacing:.04em}
.bs-h .nm .cd{font-size:9px;opacity:.5;font-weight:400}
.bs-h .st{font-size:9px;font-family:'JetBrains Mono',monospace;opacity:.7}
.bs-s{display:flex;gap:8px;padding:6px 12px 10px;flex-wrap:wrap}
.bs-i{font-size:8px;font-family:'JetBrains Mono',monospace}
.bs-i .vl{font-size:14px;font-weight:700}
.bs-i .lb{font-size:7px;color:#756f66;text-transform:uppercase;letter-spacing:.08em}
table{width:100%;border-collapse:collapse;font-size:9px}
th{padding:5px 8px;text-align:center;font-size:7px;text-transform:uppercase;letter-spacing:.08em;color:#756f66;font-weight:600;border-bottom:1px solid rgba(214,173,90,.06)}
td{padding:4px 8px;border-bottom:1px solid rgba(255,255,255,.02);vertical-align:middle;font-family:'JetBrains Mono',monospace;font-size:9px}
tr:hover td{background:rgba(255,255,255,.02)}
.tc{text-align:center}
.tr{text-align:right}
.tl{text-align:left}
.stk{font-weight:700;font-size:10px}
.stk-n{font-size:7px;color:#555;display:block;font-weight:400}
.buy{color:#22c55e;font-weight:600}
.sell{color:#ef4444;font-weight:600}
.flat{color:#756f66}
.w{overflow-x:auto}
@media(max-width:768px){table{font-size:8px}td{padding:3px 4px}th{padding:3px 4px}}
</style>
</head>
<body>
<div class="h">
  <h1>◉ BROKER ACTIVITY</h1>
  <span class="sub" id="dtL">—</span>
</div>
<div class="ct">
  <div class="cg"><label>Broker</label>
    <select id="brS" multiple>
      <option value="BB" selected>BB · Verdhana</option>
      <option value="BK" selected>BK · JP Morgan</option>
      <option value="CC" selected>CC · Mandiri Sek</option>
      <option value="AK">AK · UBS Sekuritas</option>
      <option value="AZ">AZ · Sucor</option>
      <option value="LG">LG · Trimegah</option>
      <option value="YU">YU · CGS International</option>
      <option value="XL">XL · Stockbit</option>
      <option value="NI">NI · BNI Sekuritas</option>
      <option value="ZP">ZP · Maybank</option>
      <option value="OD">OD · BRI</option>
      <option value="DX">DX · Bahana</option>
      <option value="TP">TP · OCBC</option>
    </select></div>
  <div class="cg"><label>Tanggal</label><input type="date" id="dI"></div>
  <div class="cg"><label>Min Value (Rp)</label>
    <select id="mV">
      <option value="0">All</option>
      <option value="1000000000">Rp 1M</option>
      <option value="5000000000">Rp 5M</option>
      <option value="20000000000" selected>Rp 20M</option>
      <option value="25000000000">Rp 25M</option>
      <option value="50000000000">Rp 50M</option>
      <option value="100000000000">Rp 100M</option>
    </select></div>
  <div class="cg"><label>&nbsp;</label><button class="go" id="gB" onclick="fetchD()">▣ SCAN</button></div>
</div>
<div id="eM" class="err"></div>
<div class="bx" id="mainC"><div class="ld">Pilih broker & tanggal, lalu scan</div></div>

<script>
const BNAM={"BB":"Verdhana","BK":"JP Morgan","CC":"Mandiri Sekuritas","AK":"UBS Sekuritas","AZ":"Sucor","LG":"Trimegah","XL":"Stockbit","NI":"BNI Sekuritas","ZP":"Maybank","OD":"BRI","DX":"Bahana","YU":"CGS International","TP":"OCBC"};
const CLR={"BB":"#d6ad5a","BK":"#818cf8","CC":"#fb923c"};
const d=new Date();const y=new Date(d);y.setDate(y.getDate()-1);
if(y.getDay()===0)y.setDate(y.getDate()-2);if(y.getDay()===6)y.setDate(y.getDate()-1);
document.getElementById('dI').value=y.toISOString().slice(0,10);

function eI(id){return document.getElementById(id)}
function sE(m){const x=eI('eM');x.textContent=m;x.style.display='block';setTimeout(()=>x.style.display='none',5000)}
function fL(n){n=Number(n);if(Math.abs(n)>=1e6)return(n/1e6).toFixed(1)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(1)+'K';return n+''}
function fR(n){n=Number(n);if(n>=1e12)return'Rp'+(n/1e12).toFixed(1)+'T';if(n>=1e9)return'Rp'+(n/1e9).toFixed(1)+'M';if(n>=1e6)return'Rp'+(n/1e6).toFixed(0)+'Jt';return'Rp'+n.toLocaleString('id')}
function cV(v){if(v===undefined||v===null)return'<span class="flat">—</span>';const n=Number(v);if(n>0)return'<span class="buy">+'+fL(n)+'</span>';if(n<0)return'<span class="sell">'+fL(n)+'</span>';return'<span class="flat">0</span>'}

async function fetchD(){
  const b=eI('gB');b.disabled=true;b.textContent='SCAN...';
  const sel=eI('brS');const brs=[...sel.selectedOptions].map(o=>o.value).join(',');
  if(!brs){sE('Pilih minimal 1 broker');b.disabled=false;b.textContent='▣ SCAN';return}
  const dt=eI('dI').value;
  const mv=eI('mV').value;
  eI('mainC').innerHTML='<div class="ld">Scanning '+brs.split(',').length+' brokers</div>';
  eI('dtL').textContent=dt+' | Min '+fR(Number(mv));
  try{
    const r=await fetch('/api/scan?brokers='+encodeURIComponent(brs)+'&date='+dt+'&minVal='+mv);
    if(!r.ok)throw Error('HTTP '+r.status);
    const d=await r.json();if(d.error)throw Error(d.error);
    ren(d,brs.split(',').map(x=>x.trim()));
  }catch(x){sE('Err: '+x.message);eI('mainC').innerHTML='<div class="err">'+x.message+'</div>'}
  b.disabled=false;b.textContent='▣ SCAN';
}

function ren(d,brs){
  let h='';
  brs.forEach((bc,i)=>{
    const bk=d.brokers[bc]||[];
    const totN=bk.reduce((s,b)=>s+Number(b.net_lot),0);
    const totV=bk.reduce((s,b)=>s+Number(b.total_lot),0);
    const totVa=bk.reduce((s,b)=>s+Number(b.total_value),0);
    const isBuy=totN>=0;
    const c=CLR[bc]||'#d6ad5a';

    h+='<div class="bs" style="border-left:3px solid '+c+'">';
    h+='<div class="bs-h"><div><span class="nm" style="color:'+c+'">'+bc+'</span><span class="nm cd"> · '+(BNAM[bc]||bc)+'</span></div>'+
      '<span class="st" style="color:'+(isBuy?'#22c55e':'#ef4444')+'">'+(isBuy?'+':'')+fL(totN)+' lot</span></div>';
    h+='<div class="bs-s">'+
      '<div class="bs-i"><div class="vl" style="color:'+(isBuy?'#22c55e':'#ef4444')+'">'+fR(Math.abs(totVa))+'</div><div class="lb">Total Value</div></div>'+
      '<div class="bs-i"><div class="vl">'+fL(totV)+'</div><div class="lb">Volume (lot)</div></div>'+
      '<div class="bs-i"><div class="vl">'+bk.length+'</div><div class="lb">Stocks</div></div>'+
      '</div>';

    if(bk.length){
      h+='<div class="w"><table><thead><tr>'+
        '<th class="tl">Stock</th><th class="tc">Type</th><th class="tc">Net Lot</th><th class="tc">Lot</th><th class="tc">Avg Buy</th><th class="tc">Avg Sell</th><th class="tr">Value</th>'+
        '</tr></thead><tbody>';
      bk.forEach(r=>{
        const n=Number(r.net_lot);
        h+='<tr><td class="tl"><span class="stk" style="color:'+c+'">'+r.stock+'</span><span class="stk-n">'+(r.name||'').substring(0,16)+'</span></td>'+
          '<td class="tc">'+(r.type||'—')+'</td>'+
          '<td class="tc">'+cV(n)+'</td>'+
          '<td class="tc">'+fL(Number(r.total_lot))+'</td>'+
          '<td class="tc">'+(r.avg_buy?'Rp'+Number(r.avg_buy).toLocaleString('id'):'—')+'</td>'+
          '<td class="tc">'+(r.avg_sell?'Rp'+Number(r.avg_sell).toLocaleString('id'):'—')+'</td>'+
          '<td class="tr">'+fR(Number(r.total_value))+'</td></tr>';
      });
      h+='</tbody></table></div>';
    }else{
      h+='<div style="padding:12px;font-size:9px;color:#555;text-align:center">No activity</div>';
    }
    h+='</div>';
  });
  eI('mainC').innerHTML=h;
}

document.getElementById('brS').addEventListener('change',fetchD);
document.getElementById('dI').addEventListener('change',fetchD);
document.getElementById('mV').addEventListener('change',fetchD);
fetchD();
</script>
</body>
</html>
